<html lang="en">

<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body,#root{height:100%;width:100%;}
  body{
    font-family:'JetBrains Mono',monospace;
    background:#080808;

    overflow:hidden;

  }
  body::before{
    content:'';
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,0.03) 0px,rgba(0,0,0,0.03) 2px,transparent 2px,transparent 4px);

    z-index:9999;

  ::-webkit-scrollbar-track{background:#080808;}
  ::-webkit-scrollbar-thumb{background:#2A2A2A;border-radius:0;}
  input::placeholder{color:#33333388;}
  select option{background:#0F0F0F;color:#E8E8E8;}
  input,select,button{font-family:'JetBrains Mono',monospace;}
  #root{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);}
  input, select, textarea {
    font-size: 16px !important;
  }
  button { touch-action: manipulation; }
  * { -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

// ── helpers ──────────────────────────────────────────────────────────────────
const uid = () => Math.random().toString(36).slice(2,10);
const fmt = n => new Intl.NumberFormat("en-US",{style:"currency",currency:"USD"}).format(n);
const fmtDate = d => new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
const today = () => new Date().toISOString().slice(0,10);

// ── seed data ─────────────────────────────────────────────────────────────────

// ── SVG icons ─────────────────────────────────────────────────────────────────
const ICONS = {

  chart:<><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></>,
  list:<><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></>,
  gear:<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></>,
  target:<><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></>,

  download:<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
};
const Icon = ({name,size=16})=>(
  <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
    fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    {ICONS[name]}

);

// ── shared styles ─────────────────────────────────────────────────────────────
const INP={width:"100%",padding:"10px 12px",background:"#141414",border:"1px solid #1C1C1C",borderRadius:2,color:"#E8E8E8",fontSize:16,outline:"none",boxSizing:"border-box"};
const CARD={background:"#0F0F0F",border:"1px solid #1C1C1C",borderRadius:2,padding:16};

const Field=({label,children})=>(
  <div style={{marginBottom:14}}>
    <label style={{display:"block",fontSize:10,fontWeight:500,letterSpacing:".12em",color:"#555555",textTransform:"uppercase",marginBottom:6}}>{label}</label>
    {children}
  </div>
);

const Btn=({onClick,variant="primary",children,style={}})=>{
  const base={display:"inline-flex",alignItems:"center",gap:6,padding:"10px 16px",borderRadius:0,border:"none",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"};
  const vs={primary:{background:"#00E87A",color:"#080808"},ghost:{background:"transparent",color:"#555555",border:"1px solid #2A2A2A"},danger:{background:"transparent",color:"#FF3B3B",border:"1px solid #FF3B3B"}};
  return <button onClick={onClick} style={{...base,...vs[variant],...style}}>{children}</button>;
};

const Modal=({title,onClose,children})=>(
  <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:1000}}>
    <div style={{background:"#080808",border:"1px solid #1C1C1C",borderRadius:0,padding:"24px",width:"100%",maxWidth:560,maxHeight:"90vh",overflowY:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 style={{margin:0,fontSize:16,fontWeight:700,color:"#E8E8E8",textTransform:"uppercase",letterSpacing:".08em"}}>{title}</h2>
        <button onClick={onClose} style={{background:"transparent",border:"1px solid #2A2A2A",borderRadius:0,width:36,height:36,cursor:"pointer",color:"#555555",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="x" size={14}/></button>
      </div>
      {children}
    </div>
  </div>
);

// ── CSV export ────────────────────────────────────────────────────────────────
const exportCSV=(transactions,accounts)=>{
  const amap=Object.fromEntries(accounts.map(a=>[a.id,a.name]));
  const rows=[["Date","Type","Amount","Payee","Parent Category","Category","Account","Description","Note","Transfer To"]];
  transactions.forEach(t=>{
    let parentCat="",subCat="";
    if(t.splits&&t.splits.length){
      parentCat="[SPLIT]";
      subCat="[SPLIT]";
    }else{
      parentCat=t.parentCategory||"";
      subCat=t.category||"";
    }
    rows.push([t.date,t.type,t.amount,t.payee||"",parentCat,subCat,amap[t.accountId]||"",t.description||"",t.note||"",t.transferToId?amap[t.transferToId]:""]);
  });
  const csv=rows.map(r=>r.map(c=>`"${c}"`).join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="transactions.csv";a.click();
};

// ── Budget CSV export (hierarchical) ─────────────────────────────────────────
const exportBudgetCSV=(budgetData)=>{
  const rows=[["Type","Parent Category","Subcategory","Budget","Actual","Variance","% Used"]];

  ["income","expense"].forEach(kind=>{
    budgetData[kind].forEach(({parent,kind:k,parentBudget,parentActual,parentVariance,parentPct,subs})=>{
      subs.forEach(({subcat,budgetAmt,actual,variance,pct})=>{
        rows.push([k,parent,subcat,budgetAmt.toFixed(2),actual.toFixed(2),variance.toFixed(2),pct!==null?pct+"%":"—"]);
      });
      rows.push([k,parent,"TOTAL",parentBudget.toFixed(2),parentActual.toFixed(2),parentVariance.toFixed(2),parentPct!==null?parentPct+"%":"—"]);
      rows.push([]);
    });
  });

  const incTotal={budget:budgetData.income.reduce((s,r)=>s+r.parentBudget,0),actual:budgetData.income.reduce((s,r)=>s+r.parentActual,0)};
  const expTotal={budget:budgetData.expense.reduce((s,r)=>s+r.parentBudget,0),actual:budgetData.expense.reduce((s,r)=>s+r.parentActual,0)};
  rows.push(["","","INCOME TOTAL",incTotal.budget.toFixed(2),incTotal.actual.toFixed(2),(incTotal.budget-incTotal.actual).toFixed(2),""]);
  rows.push(["","","EXPENSE TOTAL",expTotal.budget.toFixed(2),expTotal.actual.toFixed(2),(expTotal.budget-expTotal.actual).toFixed(2),""]);
  rows.push(["","","NET",(incTotal.budget-expTotal.budget).toFixed(2),(incTotal.actual-expTotal.actual).toFixed(2),((incTotal.budget-expTotal.budget)-(incTotal.actual-expTotal.actual)).toFixed(2),""]);

  const csv=rows.map(r=>r.map(c=>`"${c}"`).join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="budget.csv";a.click();
};

// ── Progress Bar component for budget ─────────────────────────────────────────
const ProgressBar=({pct})=>{
  if(pct===null) return <span style={{color:"#333333",fontSize:10,fontFamily:"'JetBrains Mono',monospace"}}>{"[" + "—".repeat(12) + "] N/A"}</span>;
  const filled=Math.min(Math.round(pct/(100/12)),12);
  const empty=12-filled;
  const color=pct<80?"#00C96A":pct<100?"#FFB03B":"#FF3B3B";
  return <span style={{color,fontSize:10,fontFamily:"'JetBrains Mono',monospace"}}>
    {"[" + "█".repeat(filled) + "░".repeat(empty) + "] " + pct + "%"}
  </span>;
};

// ── TxList ────────────────────────────────────────────────────────────────────
function TxList({txs,accounts,onDelete}){
  const amap=Object.fromEntries(accounts.map(a=>[a.id,a]));
  if(!txs.length) return <div style={{padding:32,textAlign:"center",color:"#333333",fontSize:12}}>— no transactions —</div>;  return(<div style={{...CARD,padding:0,overflow:"hidden",WebkitOverflowScrolling:"touch"}}>
    <div style={{borderBottom:"1px solid #1C1C1C"}}>
      {txs.map(t=>{
        const acc=amap[t.accountId];
        const splits=t.splits&&t.splits.length;
        const catDisplay=splits?"[SPLIT]":(t.category||"");
        const amt=t.type==="income"?t.amount:-t.amount;
        return(<div key={t.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",borderTop:"1px solid #0F0F0F",cursor:"pointer",transition:"background 0.15s"}} onMouseEnter={e=>e.currentTarget.style.background="#141414"} onMouseLeave={e=>e.currentTarget.style.background="none"}><div style={{flex:1,minWidth:0}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}><span style={{fontSize:9,fontWeight:700,textTransform:"uppercase",color:"#777777"}}>{fmtDate(t.date)}</span><span style={{fontSize:11,fontWeight:700,color:splits?"#FFB03B":"#E8E8E8"}}>{catDisplay}</span></div><div style={{fontSize:10,color:"#777777"}}>{acc?.name||"??"} {t.payee?`• ${t.payee}`:""}</div></div><div style={{textAlign:"right",display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}><div style={{fontSize:12,fontWeight:700,color:t.type==="income"?"#00C96A":"#FF3B3B"}}>{amt>=0?"+":""}{fmt(amt)}</div><button onClick={e=>{e.stopPropagation();onDelete(t.id);}} style={{background:"none",border:"none",cursor:"pointer",color:"#333333",fontSize:9,padding:10,minHeight:44,minWidth:44,display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="trash" size={10}/></button></div></div>);
      })}
    </div>
  </div>);
}

// ── Period controls ───────────────────────────────────────────────────────────
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const PILL_BASE={padding:"6px 10px",borderRadius:0,border:"1px solid",fontSize:10,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0,textTransform:"uppercase",minHeight:44,display:"flex",alignItems:"center",justifyContent:"center"};
const navArrow={background:"transparent",border:"1px solid #2A2A2A",borderRadius:0,color:"#E8E8E8",width:44,height:44,cursor:"pointer",fontSize:13,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0};

function PeriodPills({filter,setFilter,size="normal"}){
  const s=size==="small"?{...PILL_BASE,padding:"5px 10px",fontSize:9}:PILL_BASE;
  return(
    <div style={{display:"flex",gap:4,overflowX:"auto",paddingBottom:2}}>
      {[["day","TODAY"],["week","WEEK"],["month","MONTH"],["year","YEAR"],["range","RANGE"],["all","ALL"]].map(([p,l])=>(
        <button key={p} onClick={()=>setFilter(f=>({...f,period:p}))}
          style={{...s,background:filter.period===p?"#00E87A":"transparent",borderColor:filter.period===p?"#00E87A":"#2A2A2A",color:filter.period===p?"#080808":"#555555"}}>
          {l}
        </button>
      ))}
    </div>
  );
}

function PeriodSubControls({filter,setFilter}){
  if(filter.period==="month"){
    const prevM=()=>setFilter(f=>f.month===1?{...f,month:12,year:f.year-1}:{...f,month:f.month-1});
    const nextM=()=>setFilter(f=>f.month===12?{...f,month:1,year:f.year+1}:{...f,month:f.month+1});
    return(
      <div style={{display:"flex",alignItems:"center",gap:8,marginTop:8}}>
        <button onClick={prevM} style={navArrow}>‹</button>
        <div style={{flex:1,display:"flex",gap:6,alignItems:"center"}}>
          <select value={filter.month} onChange={e=>setFilter(f=>({...f,month:parseInt(e.target.value)}))}
            style={{...INP,flex:1,fontSize:11,padding:"6px 8px"}}>
            {MONTHS.map((m,i)=><option key={i+1} value={i+1}>{m}</option>)}
          </select>
          <input type="number" value={filter.year} onChange={e=>setFilter(f=>({...f,year:parseInt(e.target.value)||f.year}))}
            style={{...INP,width:72,fontSize:11,padding:"6px 8px"}} placeholder="YYYY"/>
        </div>
        <button onClick={nextM} style={navArrow}>›</button>
      </div>
    );
  }
  if(filter.period==="year"){
    const prevY=()=>setFilter(f=>({...f,year:f.year-1}));
    const nextY=()=>setFilter(f=>({...f,year:f.year+1}));
    return(
      <div style={{display:"flex",alignItems:"center",gap:8,marginTop:8}}>
        <button onClick={prevY} style={navArrow}>‹</button>
        <input type="number" value={filter.year} onChange={e=>setFilter(f=>({...f,year:parseInt(e.target.value)||f.year}))}
          style={{...INP,flex:1,fontSize:11,padding:"6px 8px",textAlign:"center"}} placeholder="YYYY"/>
        <button onClick={nextY} style={navArrow}>›</button>
      </div>
    );
  }
  if(filter.period==="range"){
    return(
      <div style={{display:"flex",gap:6,marginTop:8,alignItems:"center"}}>
        <div style={{display:"flex",flexDirection:"column",flex:1,gap:3}}>
          <span style={{fontSize:9,color:"#555555",fontWeight:700,letterSpacing:".1em"}}>FROM</span>
          <input type="date" value={filter.from} onChange={e=>setFilter(f=>({...f,from:e.target.value}))} style={{...INP,fontSize:11,padding:"6px 8px"}}/>
        </div>
        <div style={{color:"#333333",fontSize:11,paddingTop:16}}>→</div>
        <div style={{display:"flex",flexDirection:"column",flex:1,gap:3}}>
          <span style={{fontSize:9,color:"#555555",fontWeight:700,letterSpacing:".1em"}}>TO</span>
          <input type="date" value={filter.to} onChange={e=>setFilter(f=>({...f,to:e.target.value}))} style={{...INP,fontSize:11,padding:"6px 8px"}}/>
        </div>
      </div>
    );
  }
  return null;
}

function App(){
  const loaded=load();
  const [state,setState]=useState(()=>{
    if(!loaded) return SEED;
    const merged={...SEED,...loaded};
    if(!merged.categories.subcategories) merged.categories={...merged.categories,subcategories:SEED.categories.subcategories};
    if(!merged.accountTypes) merged.accountTypes=SEED.accountTypes;
    if(!merged.budgets) merged.budgets={};
    return merged;
  });
  const [view,setView]=useState("dashboard");
  const [modal,setModal]=useState(null);
  const [filter,setFilter]=useState({
    period:"month",
    account:"all",
    category:"all",
    month:new Date().getMonth()+1,
    year:new Date().getFullYear(),
    from:new Date().toISOString().slice(0,8)+"01",
    to:new Date().toISOString().slice(0,10),
  });
  const [form,setForm]=useState({});
  const [budgetMode,setBudgetMode]=useState("monthly");
  const [budgetMonth,setBudgetMonth]=useState(()=>new Date().getMonth()+1);
  const [budgetYear,setBudgetYear]=useState(()=>new Date().getFullYear());
  const [budgetFrom,setBudgetFrom]=useState(()=>new Date().toISOString().slice(0,8)+"01");
  const [budgetTo,setBudgetTo]=useState(()=>new Date().toISOString().slice(0,10));
  const [expandedCategories,setExpandedCategories]=useState({});
  const [expandedBudgetParents,setExpandedBudgetParents]=useState({});

  useEffect(()=>{save(state);},[state]);
  const setF=(k,v)=>setForm(f=>({...f,[k]:v}));
  const closeModal=()=>{setModal(null);setForm({});};

  // Budget state handlers for subcategories
  const setBudgetYearly=(subcat,val)=>{
    const amt=parseFloat(val)||0;
    setState(s=>({...s,budgets:{...s.budgets,[subcat]:{...(s.budgets[subcat]||{monthly:{}}),yearly:amt}}}));
  };

  const distributeYearly=(subcat)=>{
    const yearly=state.budgets[subcat]?.yearly||0;
    const monthly={};
    for(let m=1;m<=12;m++)monthly[String(m)]=Math.round((yearly/12)*100)/100;
    setState(s=>({...s,budgets:{...s.budgets,[subcat]:{...(s.budgets[subcat]||{}),yearly:s.budgets[subcat]?.yearly||0,monthly}}}));
  };

  const setBudgetMonthly=(subcat,month,val)=>{
    const amt=parseFloat(val)||0;
    setState(s=>({...s,budgets:{...s.budgets,[subcat]:{...(s.budgets[subcat]||{yearly:0}),monthly:{...(s.budgets[subcat]?.monthly||{}),[String(month)]:amt}}}}));
  };

  const filtered=useMemo(()=>{
    let txs=[...state.transactions].sort((a,b)=>b.date.localeCompare(a.date));
    const now=new Date();
    if(filter.period!=="all"){
      txs=txs.filter(t=>{
        const d=new Date(t.date+"T00:00:00");
        if(filter.period==="day") return d.toDateString()===now.toDateString();
        if(filter.period==="week"){const s=new Date(now);s.setDate(now.getDate()-7);return d>=s;}
        if(filter.period==="month") return d.getMonth()+1===filter.month&&d.getFullYear()===filter.year;
        if(filter.period==="year") return d.getFullYear()===filter.year;
        if(filter.period==="range"){
          const from=new Date(filter.from+"T00:00:00"),to=new Date(filter.to+"T00:00:00");
          return d>=from&&d<=to;
        }
        return true;
      });
    }
    if(filter.account!=="all") txs=txs.filter(t=>t.accountId===filter.account);
    if(filter.category!=="all"){
      txs=txs.filter(t=>{
        if(t.splits&&t.splits.length) return t.splits.some(s=>s.category===filter.category||s.parentCategory===filter.category);
        return t.category===filter.category||t.parentCategory===filter.category;
      });
    }
    return txs;
  },[state.transactions,filter]);

  const totals=useMemo(()=>{
    let income=0,expenses=0;
    filtered.forEach(t=>{if(t.type==="income")income+=t.amount;if(t.type==="expense")expenses+=t.amount;});
    return{income,expenses,net:income-expenses};
  },[filtered]);

  // Hierarchical budget data with parent rollups
  const budgetData=useMemo(()=>{
    const inPeriod=(t)=>{
      const d=new Date(t.date+"T00:00:00");
      if(budgetMode==="monthly") return d.getMonth()+1===budgetMonth&&d.getFullYear()===budgetYear;
      if(budgetMode==="yearly") return d.getFullYear()===budgetYear;
      const from=new Date(budgetFrom+"T00:00:00"),to=new Date(budgetTo+"T00:00:00");
      return d>=from&&d<=to;
    };

    const getSubcatActual=(subcat,parentCat)=>{
      let actual=0;
      state.transactions.filter(inPeriod).forEach(t=>{
        if(t.splits&&t.splits.length){
          t.splits.filter(s=>s.category===subcat&&s.parentCategory===parentCat).forEach(s=>{actual+=s.amount;});
        }else if(t.category===subcat&&t.parentCategory===parentCat){
          actual+=t.amount;
        }
      });
      return actual;
    };

    const getSubcatBudget=(subcat)=>{
      const entry=state.budgets[subcat]||{yearly:0,monthly:{}};
      if(budgetMode==="monthly") return parseFloat(entry.monthly?.[String(budgetMonth)]||0);
      if(budgetMode==="yearly") return parseFloat(entry.yearly||0);
      const from=new Date(budgetFrom+"T00:00:00"),to=new Date(budgetTo+"T00:00:00");
      let total=0,m=new Date(from.getFullYear(),from.getMonth(),1);
      while(m<=to){total+=parseFloat(entry.monthly?.[String(m.getMonth()+1)]||0);m.setMonth(m.getMonth()+1);}
      return total;
    };

    const buildSection=(parents,kind)=>parents.map(parent=>{
      const subs=(state.categories.subcategories[parent]||[]).map(subcat=>{
        const budgetAmt=getSubcatBudget(subcat);
        const actual=getSubcatActual(subcat,parent);
        const variance=budgetAmt-actual;
        const pct=budgetAmt>0?Math.min(Math.round((actual/budgetAmt)*100),999):null;
        return{subcat,budgetAmt,actual,variance,pct};
      });
      const parentBudget=subs.reduce((s,r)=>s+r.budgetAmt,0);
      const parentActual=subs.reduce((s,r)=>s+r.actual,0);
      const parentVariance=parentBudget-parentActual;
      const parentPct=parentBudget>0?Math.min(Math.round((parentActual/parentBudget)*100),999):null;
      return{parent,kind,parentBudget,parentActual,parentVariance,parentPct,subs};
    });

    return{income:buildSection(state.categories.income,"income"),expense:buildSection(state.categories.expense,"expense")};
  },[state.transactions,state.budgets,state.categories,budgetMode,budgetMonth,budgetYear,budgetFrom,budgetTo]);

  const netWorth=state.accounts.reduce((s,a)=>s+a.balance,0);

  const resolveAccount=(s,idOrName)=>{
    if(!idOrName) return{accounts:s.accounts,resolvedId:null};
    if(s.accounts.find(a=>a.id===idOrName)) return{accounts:s.accounts,resolvedId:idOrName};
    const byName=s.accounts.find(a=>a.name.toLowerCase()===idOrName.toLowerCase());
    if(byName) return{accounts:s.accounts,resolvedId:byName.id};
    const colors=["#00C96A","#4D9EFF","#FF3B3B","#00E87A","#E87AFF","#FFB03B"];
    const newAcc={id:uid(),name:idOrName,type:"checking",balance:0,beginningBalance:0,color:colors[s.accounts.length%colors.length]};
    return{accounts:[...s.accounts,newAcc],resolvedId:newAcc.id};
  };

  const addTransaction=()=>{
    const{type,date,amount,payee,category,parentCategory,customCat,accountId,accountName,note,description,transferToId,transferToName,splitMode,splits}=form;
    if(!date) return;

    let finalSplits=null;
    let amt=0;
    let finalCat="";
    let finalParentCat="";

    if(splitMode&&splits&&splits.length>0){
      const validSplits=splits.filter(s=>s.parentCategory&&(s.category||s.customCat)&&parseFloat(s.amount)>0);
      if(!validSplits.length) return;
      finalSplits=validSplits.map(s=>({
        parentCategory:s.parentCategory,
        category:s.customCat||s.category,
        amount:parseFloat(s.amount)
      }));
      amt=finalSplits.reduce((s,r)=>s+r.amount,0);
    }else{
      amt=parseFloat(amount);
      if(isNaN(amt)||amt<=0) return;
      finalCat=(customCat||category||"").trim();
      finalParentCat=(parentCategory||"").trim();
    }

    const payeeVal=(payee||"").trim();
    const accountKey=accountName||accountId||"";
    const toKey=transferToName||transferToId||"";

    setState(s=>{
      const payees=payeeVal&&!s.payees.includes(payeeVal)?[...s.payees,payeeVal]:s.payees;
      let categories=s.categories;
      if(!splitMode&&finalCat&&finalParentCat){
        const subs=s.categories.subcategories[finalParentCat]||[];
        if(!subs.includes(finalCat)){
          categories={...s.categories,subcategories:{...s.categories.subcategories,[finalParentCat]:[...subs,finalCat]}};
        }
      }
      if(splitMode&&finalSplits){
        finalSplits.forEach(sp=>{
          const subs=categories.subcategories[sp.parentCategory]||[];
          if(!subs.includes(sp.category)){
            categories={...categories,subcategories:{...categories.subcategories,[sp.parentCategory]:[...subs,sp.category]}};
          }
        });
      }

      const{accounts:accs1,resolvedId}=resolveAccount(s,accountKey);
      let finalAccs=accs1,resolvedToId=null;
      if(type==="transfer"){
        const{accounts:accs2,resolvedId:rid2}=resolveAccount({...s,accounts:accs1},toKey);
        finalAccs=accs2;resolvedToId=rid2;
      }
      if(!resolvedId) return s;

      const tx={
        id:uid(),type,date,amount:amt,payee:payeeVal,
        accountId:resolvedId,note:note||"",description:description||"",
        parentCategory:finalSplits?null:finalParentCat,
        category:finalSplits?null:finalCat,
        splits:finalSplits,
        transferToId:resolvedToId
      };

      const accounts=finalAccs.map(a=>{
        if(a.id===resolvedId) return{...a,balance:type==="income"?a.balance+amt:a.balance-amt};
        if(type==="transfer"&&a.id===resolvedToId) return{...a,balance:a.balance+amt};
        return a;
      });

      return{...s,payees,categories,accounts,transactions:[tx,...s.transactions]};
    });
    closeModal();
  };

  const deleteTransaction=(id)=>{
    setState(s=>({...s,transactions:s.transactions.filter(t=>t.id!==id)}));
  };

  const addPayee=()=>{
    const name=form.payeeName?.trim();
    if(!name||state.payees.includes(name)) return;
    setState(s=>({...s,payees:[...s.payees,name]}));
    setF("payeeName","");
  };

  const addAccount=()=>{
    const{name,type,balance}=form;
    if(!name?.trim()) return;
    const acc={id:uid(),name:name.trim(),type:type||"checking",balance:parseFloat(balance)||0,beginningBalance:parseFloat(balance)||0,color:["#00C96A","#4D9EFF","#FF3B3B","#00E87A","#E87AFF","#FFB03B"][state.accounts.length%6]};
    setState(s=>({...s,accounts:[...s.accounts,acc]}));
    closeModal();
  };

  const deleteSubcategory=(parent,sub)=>{
    setState(s=>{
      const newsubs=s.categories.subcategories[parent].filter(x=>x!==sub);
      return{...s,categories:{...s.categories,subcategories:{...s.categories.subcategories,[parent]:newsubs}}};
    });
  };

  const addSubcategory=(parent)=>{
    const name=form[`newSub_${parent}`]?.trim();
    if(!name) return;
    const subs=state.categories.subcategories[parent]||[];
    if(subs.includes(name)) return;
    setState(s=>({...s,categories:{...s.categories,subcategories:{...s.categories.subcategories,[parent]:[...subs,name]}}}));
    setF(`newSub_${parent}`,"");
  };

  const addParentCategory=(kind)=>{
    const name=form.newParent?.trim();
    if(!name||state.categories[kind].includes(name)) return;
    const newCats={...state.categories,[kind]:[...state.categories[kind],name]};
    const newSubs={...newCats.subcategories,[name]:["Other"]};
    return setState(s=>({...s,categories:{...newCats,subcategories:newSubs},budgets:{...s.budgets,[name]:{yearly:0,monthly:{}}}}));
    setF("newParent","");
  };

  const getCategoryOptions=(kind)=>{
    const parents=state.categories[kind]||[];
    return parents.map(p=>{
      const subs=state.categories.subcategories[p]||[];
      return{parent:p,subs};
    });
  };

  const navBtn=v=>({
    flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,padding:"10px 0",minHeight:52,
    background:"none",border:"none",cursor:"pointer",
    color:view===v?"#00E87A":"#555555",fontSize:10,fontWeight:700,letterSpacing:".08em",textTransform:"uppercase"
  });

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:"#080808"}}>

      <div style={{background:"#0F0F0F",borderBottom:"1px solid #1C1C1C",padding:"12px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
        <div>
          <div style={{fontSize:13,fontWeight:700,color:"#E8E8E8",textTransform:"uppercase",letterSpacing:".14em"}}>LEDGER</div>
          <div style={{fontSize:9,color:"#555555",letterSpacing:".12em",marginTop:2}}>TERMINAL v2</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:9,color:"#555555",letterSpacing:".12em",marginBottom:2}}>NET WORTH</div>
          <div style={{fontSize:15,color:netWorth>=0?"#00E87A":"#FF3B3B",fontWeight:700}}>{fmt(netWorth)}</div>
        </div>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"16px 14px"}}>

        {view==="dashboard"&&(<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div>
              <h1 style={{fontSize:15,color:"#E8E8E8",fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",margin:0}}>Overview</h1>
              <p style={{fontSize:10,color:"#555555",marginTop:3,letterSpacing:".06em"}}>{new Date().toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}</p>
            </div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>{setForm({type:"transfer",date:today()});setModal("transfer");}} style={{background:"transparent",border:"1px solid #2A2A2A",borderRadius:0,color:"#555555",padding:"8px 10px",cursor:"pointer",display:"flex",alignItems:"center",gap:4,fontSize:11,fontWeight:700,textTransform:"uppercase"}}><Icon name="transfer" size={12}/>TXN</button>
              <button onClick={()=>{setForm({type:"expense",date:today()});setModal("add");}} style={{background:"#00E87A",border:"none",borderRadius:0,color:"#080808",padding:"8px 10px",cursor:"pointer",display:"flex",alignItems:"center",gap:4,fontSize:11,fontWeight:700,textTransform:"uppercase"}}><Icon name="plus" size={12}/>ADD</button>
            </div>
          </div>

          <div style={{marginBottom:16}}>
            <PeriodPills filter={filter} setFilter={setFilter}/>
            <PeriodSubControls filter={filter} setFilter={setFilter}/>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:16}}>
            {[{label:"INCOME",val:totals.income,color:"#00C96A"},{label:"EXPENSE",val:totals.expenses,color:"#FF3B3B"},{label:"NET",val:totals.net,color:totals.net>=0?"#00E87A":"#FF3B3B"}].map(s=>(<div key={s.label} style={{...CARD,padding:12}}><div style={{fontSize:9,color:"#555555",fontWeight:700,letterSpacing:".12em",marginBottom:4}}>{s.label}</div><div style={{fontSize:14,color:s.color,fontWeight:700}}>{fmt(s.val)}</div></div>))}
          </div>

          <div style={{marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <h2 style={{fontSize:12,fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",margin:0}}>Accounts</h2>
              <button onClick={()=>{setForm({});setModal("account");}} style={{background:"none",border:"none",color:"#00E87A",fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",gap:3,fontWeight:700,textTransform:"uppercase"}}><Icon name="plus" size={11}/>ADD</button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {state.accounts.map(a=>(<div key={a.id} style={{...CARD,padding:12,borderLeft:`2px solid ${a.color}`,display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}} onClick={()=>setFilter(f=>({...f,account:f.account===a.id?"all":a.id}))}><div><div style={{fontSize:9,color:"#555555",textTransform:"uppercase",letterSpacing:".08em",fontWeight:700}}>{a.type}</div><div style={{fontWeight:700,fontSize:13,color:"#E8E8E8",marginTop:2}}>{a.name}</div></div><div style={{fontSize:13,color:a.color,fontWeight:700}}>{fmt(a.balance)}</div></div>))}
            </div>
          </div>

          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <h2 style={{fontSize:12,fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",margin:0}}>Recent</h2>
              <button onClick={()=>setView("transactions")} style={{background:"none",border:"none",color:"#00E87A",fontSize:11,cursor:"pointer",fontWeight:700,textTransform:"uppercase"}}>VIEW ALL →</button>
            </div>
            <div style={{...CARD,padding:0,overflow:"hidden",WebkitOverflowScrolling:"touch"}}>
              <TxList txs={filtered.slice(0,6)} accounts={state.accounts} onDelete={deleteTransaction}/>
            </div>
          </div>
        </>)}

        {view==="transactions"&&(<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <h1 style={{fontSize:15,color:"#E8E8E8",fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",margin:0}}>Transactions</h1>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>exportCSV(state.transactions,state.accounts)} style={{background:"transparent",border:"1px solid #2A2A2A",borderRadius:0,color:"#555555",padding:"8px 10px",cursor:"pointer",display:"flex",alignItems:"center",gap:4,fontSize:11,fontWeight:700,textTransform:"uppercase"}}><Icon name="download" size={11}/>CSV</button>
              <button onClick={()=>{setForm({type:"expense",date:today()});setModal("add");}} style={{background:"#00E87A",border:"none",borderRadius:0,color:"#080808",padding:"8px 10px",cursor:"pointer",display:"flex",alignItems:"center",gap:4,fontSize:11,fontWeight:700,textTransform:"uppercase"}}><Icon name="plus" size={12}/>ADD</button>
            </div>
          </div>

          <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:14}}>
            <PeriodPills filter={filter} setFilter={setFilter} size="small"/>
            <PeriodSubControls filter={filter} setFilter={setFilter}/>
            <div style={{display:"flex",gap:6}}>
              <select value={filter.account} onChange={e=>setFilter(f=>({...f,account:e.target.value}))} style={{...INP,flex:1,fontSize:11,padding:"8px 10px"}}>
                <option value="all">ALL ACCOUNTS</option>
                {state.accounts.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
              </select>
              <select value={filter.category} onChange={e=>setFilter(f=>({...f,category:e.target.value}))} style={{...INP,flex:1,fontSize:11,padding:"8px 10px"}}>
                <option value="all">ALL CATEGORIES</option>
                {getCategoryOptions("income").map(g=>(<optgroup key={g.parent} label={`${g.parent} (income)`}>{g.subs.map(s=><option key={`i_${s}`} value={s}>{s}</option>)}</optgroup>))}
                {getCategoryOptions("expense").map(g=>(<optgroup key={g.parent} label={`${g.parent} (expense)`}>{g.subs.map(s=><option key={`e_${s}`} value={s}>{s}</option>)}</optgroup>))}
              </select>
            </div>
          </div>

          <div style={{...CARD,padding:0,overflow:"hidden",WebkitOverflowScrolling:"touch"}}>
            <TxList txs={filtered} accounts={state.accounts} onDelete={deleteTransaction}/>
          </div>
        </>)}

        {view==="budget"&&(<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <h1 style={{fontSize:15,color:"#E8E8E8",fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",margin:0}}>Budget</h1>
            <button onClick={()=>exportBudgetCSV(budgetData)} style={{background:"transparent",border:"1px solid #2A2A2A",borderRadius:0,color:"#555555",padding:"8px 10px",cursor:"pointer",display:"flex",alignItems:"center",gap:4,fontSize:11,fontWeight:700,textTransform:"uppercase"}}><Icon name="download" size={11}/>CSV</button>
          </div>

          <div style={{display:"flex",gap:4,marginBottom:14,overflowX:"auto",paddingBottom:2}}>
            {[["monthly","MONTHLY"],["yearly","YEARLY"],["range","RANGE"]].map(([m,l])=>(<button key={m} onClick={()=>setBudgetMode(m)} style={{padding:"6px 10px",borderRadius:0,border:"1px solid",fontSize:10,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0,textTransform:"uppercase",background:budgetMode===m?"#00E87A":"transparent",borderColor:budgetMode===m?"#00E87A":"#2A2A2A",color:budgetMode===m?"#080808":"#555555"}}>{l}</button>))}
          </div>

          {budgetMode==="monthly"&&(<div style={{display:"flex",gap:6,marginBottom:14}}><button onClick={()=>setBudgetMonth(m=>m===1?12:m-1)} style={{background:"transparent",border:"1px solid #2A2A2A",borderRadius:0,color:"#555555",padding:"8px 10px",cursor:"pointer",fontSize:11,fontWeight:700}}>←</button><select value={budgetMonth} onChange={e=>setBudgetMonth(parseInt(e.target.value))} style={{...INP,flex:1,fontSize:11,padding:"8px 10px"}}>{["January","February","March","April","May","June","July","August","September","October","November","December"].map((m,i)=><option key={i} value={i+1}>{m}</option>)}</select><select value={budgetYear} onChange={e=>setBudgetYear(parseInt(e.target.value))} style={{...INP,width:100,fontSize:11,padding:"8px 10px"}}>{[2023,2024,2025,2026,2027].map(y=><option key={y} value={y}>{y}</option>)}</select><button onClick={()=>setBudgetMonth(m=>m===12?1:m+1)} style={{background:"transparent",border:"1px solid #2A2A2A",borderRadius:0,color:"#555555",padding:"8px 10px",cursor:"pointer",fontSize:11,fontWeight:700}}>→</button></div>)}
          {budgetMode==="yearly"&&(<div style={{display:"flex",gap:6,marginBottom:14,alignItems:"center"}}><button onClick={()=>setBudgetYear(y=>y-1)} style={{background:"transparent",border:"1px solid #2A2A2A",borderRadius:0,color:"#555555",padding:"8px 10px",cursor:"pointer",fontSize:11,fontWeight:700}}>←</button><input type="number" value={budgetYear} onChange={e=>setBudgetYear(parseInt(e.target.value))} style={{...INP,width:100,fontSize:11,padding:"8px 10px"}}/><button onClick={()=>setBudgetYear(y=>y+1)} style={{background:"transparent",border:"1px solid #2A2A2A",borderRadius:0,color:"#555555",padding:"8px 10px",cursor:"pointer",fontSize:11,fontWeight:700}}>→</button></div>)}
          {budgetMode==="range"&&(<div style={{display:"flex",gap:6,marginBottom:14}}><input type="date" value={budgetFrom} onChange={e=>setBudgetFrom(e.target.value)} style={{...INP,flex:1,fontSize:11,padding:"8px 10px"}}/><input type="date" value={budgetTo} onChange={e=>setBudgetTo(e.target.value)} style={{...INP,flex:1,fontSize:11,padding:"8px 10px"}}/></div>)}

          <div style={{display:"flex",flexDirection:"column",gap:0,marginBottom:20}}>
            {["income","expense"].map(kind=>{
              const kindData=budgetData[kind];
              if(!kindData.length) return null;
              return(<div key={kind}><h3 style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",color:"#555555",marginBottom:0,marginTop:kind==="income"?0:12}}>{kind}</h3>{kindData.map(({parent,parentBudget,parentActual,parentVariance,parentPct,subs})=>(<div key={parent}><div onClick={()=>setExpandedBudgetParents(e=>({...e,[parent]:!e[parent]}))} style={{background:"#141414",padding:"12px 14px",borderBottom:"1px solid #1C1C1C",cursor:"pointer"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}><span style={{fontSize:12,fontWeight:700,color:"#E8E8E8"}}>{expandedBudgetParents[parent]?"▼ ":"▶ "}{parent.toUpperCase()}</span><span style={{fontSize:12,fontWeight:700,color:parentVariance>=0?"#00C96A":"#FF3B3B"}}>{parentVariance>=0?"+":""}{fmt(parentVariance)}</span></div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><ProgressBar pct={parentPct}/><span style={{fontSize:10,color:"#555555"}}>{fmt(parentActual)} / {fmt(parentBudget)}</span></div></div>{expandedBudgetParents[parent]&&subs.map(({subcat,budgetAmt,actual,variance,pct})=>(<div key={subcat} style={{padding:"8px 14px 8px 28px",background:"#0C0C0C",borderBottom:"1px solid #141414"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}><span style={{fontSize:11,color:"#888888"}}>› {subcat}</span><span style={{fontSize:11,fontWeight:700,color:variance>=0?"#00C96A":"#FF3B3B"}}>{variance>=0?"+":""}{fmt(variance)}</span></div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><ProgressBar pct={pct}/><span style={{fontSize:10,color:"#444444"}}>{fmt(actual)} / {fmt(budgetAmt)}</span></div></div>))}</div>))}</div>);
            })}
          </div>

)}<Field label="PAYEE"><select value={form.payee||""} onChange={e=>setF("payee",e.target.value)} style={INP}><option value="">— select or type —</option>{state.payees.map(p=><option key={p} value={p}>{p}</option>)}</select><input type="text" value={form.payee||""} onChange={e=>setF("payee",e.target.value)} placeholder="Payee name..." style={{...INP,marginTop:8}}/></Field><Field label="ACCOUNT"><select value={form.accountName||form.accountId||""} onChange={e=>setF("accountId",e.target.value)} style={INP}><option value="">— select —</option>{state.accounts.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}</select><input type="text" value={form.accountName||""} onChange={e=>setF("accountName",e.target.value)} placeholder="Or account name..." style={{...INP,marginTop:8}}/></Field><Field label="DESCRIPTION"><input type="text" value={form.description||""} onChange={e=>setF("description",e.target.value)} style={INP}/></Field><Field label="NOTE"><input type="text" value={form.note||""} onChange={e=>setF("note",e.target.value)} style={INP}/></Field><div style={{display:"flex",gap:6,marginTop:20}}><button onClick={closeModal} style={{...CARD,flex:1,padding:"12px",background:"transparent",borderColor:"#2A2A2A",color:"#555555",cursor:"pointer",fontWeight:700,textTransform:"uppercase"}}>CANCEL</button><button onClick={addTransaction} style={{...CARD,flex:1,padding:"12px",background:"#00E87A",color:"#080808",cursor:"pointer",fontWeight:700,textTransform:"uppercase",border:"none"}}>SAVE</button></div></Modal>)}

      {modal==="account"&&(<Modal title="ADD ACCOUNT" onClose={closeModal}><Field label="NAME"><input type="text" value={form.name||""} onChange={e=>setF("name",e.target.value)} placeholder="Account name" style={INP}/></Field><Field label="TYPE"><select value={form.type||"checking"} onChange={e=>setF("type",e.target.value)} style={INP}>{state.accountTypes.map(t=><option key={t} value={t}>{t}</option>)}</select></Field><Field label="CURRENT BALANCE"><input type="number" step="0.01" value={form.balance||""} onChange={e=>setF("balance",e.target.value)} placeholder="0.00" style={INP}/></Field><div style={{display:"flex",gap:6,marginTop:20}}><button onClick={closeModal} style={{...CARD,flex:1,padding:"12px",background:"transparent",borderColor:"#2A2A2A",color:"#555555",cursor:"pointer",fontWeight:700,textTransform:"uppercase"}}>CANCEL</button><button onClick={addAccount} style={{...CARD,flex:1,padding:"12px",background:"#00E87A",color:"#080808",cursor:"pointer",fontWeight:700,textTransform:"uppercase",border:"none"}}>CREATE</button></div></Modal>)}

    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
